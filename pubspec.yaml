name: foratt
description: "IPTV Xtream Codes Player"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  iconsax_flutter: ^1.0.1
  
  # Firebase
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.5
  cloud_firestore: ^5.6.5
  firebase_remote_config: ^5.3.5
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API
  http: ^1.3.0
  
  # Screen wakelock — now native (WAKE_LOCK permission in manifest)
  wakelock_plus: ^1.2.11
  
  # Storage
  shared_preferences: ^2.5.3
  
  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^6.2.1
  
  # URL Launcher
  url_launcher: ^6.3.2
  
  # File Operations & Updates
  dio: ^5.8.0+1
  path_provider: ^2.1.5
  open_filex: ^4.5.1
  
  # Orientation
  flutter_screenutil: ^5.9.3
  flutter_animate: ^4.5.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/images/
